name: Go

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: shallow clone
      uses: actions/checkout@v7
      if: "!startsWith(github.ref, 'refs/tags/')"

    - name: deep clone
      uses: actions/checkout@v7
      if: startsWith(github.ref, 'refs/tags/')
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v7
      with:
        go-version: '1.26.3'

    - name: Build
      run: go build -v ./...

    - name: Install Jujutsu
      run: |
        tag=$(gh release list --repo jj-vcs/jj --limit 1 --json tagName --jq '.[].tagName')
        curl -L https://github.com/jj-vcs/jj/releases/download/${tag}/jj-${tag}-x86_64-unknown-linux-musl.tar.gz | tar -xz ./jj
        sudo mv jj /usr/local/bin/
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Test
      run: go test -v -coverprofile=profile.cov ./...

    - name: "Check formatting"
      run: '[ "$(gofmt -d -s . | tee -a /dev/stderr)" = "" ]'

    - uses: shogo82148/actions-goveralls@v1
      with:
        path-to-profile: profile.cov

    - name: "staticcheck"
      run: go install honnef.co/go/tools/cmd/staticcheck@latest && staticcheck ./...

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      if: startsWith(github.ref, 'refs/tags/')
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
